name: Check Model IDs

on:
  schedule:
    - cron: '0 9 * * 0' # Every Sunday at 9am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check model IDs against live APIs
        id: check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/check-model-ids.mjs --json > report.json 2>&1 || true
          STALE=$(node -e "const r=JSON.parse(require('fs').readFileSync('report.json','utf-8')); console.log(r.stale.length)")
          echo "stale=$STALE" >> "$GITHUB_OUTPUT"
          cat report.json

      - name: Patch config and create PR
        if: steps.check.outputs.stale != '0'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/check-model-ids.mjs --patch

          BRANCH="chore/stale-models-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/config.ts
          git commit -m "chore: remove stale model IDs

          Auto-detected by weekly model check.
          See report.json in workflow run for details."
          git push origin "$BRANCH"

          STALE_LIST=$(node -e "
            const r=JSON.parse(require('fs').readFileSync('report.json','utf-8'));
            r.stale.forEach(m => console.log('- \`'+m.provider+'/'+m.model+'\` (id: '+m.id+')'));
          ")

          gh pr create \
            --title "chore: remove stale model IDs" \
            --body "## Stale models removed

          $STALE_LIST

          Detected by the weekly \`check-models\` workflow. These models no longer appear in their provider's \`/v1/models\` response.

          **Action needed:** Review removals, then consider adding replacement models if coverage gaps exist." \
            --base main
